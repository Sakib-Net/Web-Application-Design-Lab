<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
  <style>
    body {
      background-color: rgb(225, 169, 225);
    }

    h1 {
      position: absolute;
      top: 250px;
      left: 50px;
      font-size: 50px;
    }

    .box {
      position: absolute;
      top: 100px;
      left: 300px;
      width: 300px;
      height: 300px;
      border: 3px solid black;
    }

    .circle1 {
      position: absolute;
      top: -50px;
      left: 160px;
      width: 80px;
      height: 80px;
      background-color: rgb(176, 51, 141);
      border-radius: 60%;
    }

    .circle2 {
      position: absolute;
      top: 50px;
      left: 220px;
      width: 60px;
      height: 60px;
      background-color: rgb(67, 229, 153);
      border-radius: 50%;
    }

    .label {
      position: absolute;
      top: 110px;
      left: 40px;
      background-color: rgb(109, 208, 208);
      padding: 5px 10px;
    }

    .bird {
      position: absolute;
      top: 220px;
      left: 220px;
      width: 120px;
      height: 120px;
      border-radius: 60%;
      background-color: white;
    }
  </style>
</head>
<body>

  <h1>Welcome <br> <br><br> To <br> Our <br> Website</h1>

  <div class="box">
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="label">Hello!!</div>
    <img class="bird" image src="bird.jpg"
  </div>

</body>
</html>
